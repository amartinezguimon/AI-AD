# VisionMetrics edge device configuration.
# Copy to device.yaml and edit per installation. Everything that used to be
# hardcoded in main.py / calibrate.py lives here, so a new camera/store needs
# zero code changes.

device:
  device_id: "dev-CHANGE-ME"        # unique per edge box (issued by the backend)
  store_id: "store-CHANGE-ME"       # which store this box serves
  store_name: "VisionMetrics AI"    # human-readable, shown on the HUD/dashboard

camera:
  # source accepts ANY of:
  #   an integer index   -> 0, 1, 2        (USB / built-in webcam)
  #   an RTSP url         -> "rtsp://user:pass@192.168.1.50:554/stream"  (IP camera)
  #   a file path         -> "fixtures/clip.mp4"  (for offline testing)
  source: 0
  fov_h_deg: 70.0                   # horizontal field of view of THIS camera (critical for distance)
  reconnect_delay_s: 2.0            # wait between reconnect attempts if the stream drops

vision:
  face_width_m: 0.16                # assumed real adult face width (pinhole model)
  yolo_conf_min: 0.45               # reject weak person detections
  aspect_ratio_min: 0.75            # height/width floor (people are taller than wide)
  # Passerby (foot-traffic) counting: count a track as a real person once it has
  # persisted AND either moved or shown a face. Rejects flicker + static furniture.
  passerby_min_frames: 8            # frames a box must persist before it can count
  passerby_motion_px: 40            # movement (px) that proves a faceless track is a person
  passerby_min_height_frac: 0.0     # ignore people shorter than this fraction of the frame
                                    #   (too far to be a customer). 0 = off; ~0.15 in a store
                                    #   with a transverse street. Complements the counting zone.
  head_crop_frac: 0.45              # top fraction of the person bbox treated as the head
  head_upscale: 4                   # upscale factor on the head crop (enables 4 m+ detection)
  face_skip_frames: 3               # run MediaPipe face every N frames per person
  pose_enabled: true
  pose_skip_frames: 8               # run MediaPipe pose every N frames per person
  torso_neutral_span: 0.40          # shoulder span when squarely facing the camera
  torso_min_visibility: 0.40        # min landmark visibility to trust the pose result
  # Anti double-count when the tracker briefly loses a person and re-detects them
  # under a new id (occlusion, confidence dip). Two layers work together:
  track_buffer_frames: 60           # ByteTrack keeps a lost track (same id) this long (~2s @30fps)
  reassoc_grace_frames: 45          # if a NEW id appears where a lost one was, within this window,
                                    #   treat it as the same person (heals id switches)
  reassoc_min_iou: 0.30             # box overlap required to consider them the same person

engagement:
  frame_buffer_size: 3
  frame_engage_min: 1               # engaged frames (of the last N) to be "looking"; raise to 2 to be stricter
  count_threshold_s: 2.0            # attention before counting as "engaged"
  zone_soft_margin: 0.30            # width of the soft engagement-zone edge
  min_engage_window_s: 0.4          # discard looking windows shorter than this (anti-flicker: shadows, brief glances)

models:
  yolo: "yolov8n.pt"
  face: "models/face_landmarker.task"
  pose: "models/pose_landmarker_lite.task"
  engagement: "models/engagement_model.pth"

calibration:
  # path to the per-store calibration produced by the calibration wizard;
  # null => run the classifier with no zone filter.
  # The same file can hold a "counting_region" polygon (the storefront area that
  # counts) — draw it with:
  #   python -m visionmetrics.edge.tools.draw_zone --source 0 --config configs/store_config.json
  # People whose feet fall outside it are never counted (fixes "far people counted").
  config_path: "configs/store_config.json"

uplink:
  # where aggregate metrics are sent. enabled=false runs fully local (prototype mode).
  enabled: false
  base_url: "https://metrics.example.com"
  api_key: "CHANGE-ME"
  flush_interval_s: 60              # how often to POST a metric bucket
  buffer_path: "data/uplink_buffer.sqlite"  # offline buffer if the network is down
